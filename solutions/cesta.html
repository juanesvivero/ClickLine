<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cesta de Compras | Clickline Solutions</title>
  <meta name="theme-color" content="#ffffff"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #ffffff;
      --dark: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #f8f9fb;
      --surface-3: #eef1f4;
      --ink: #15171a;
      --muted: #626a73;
      --accent: #3f4652;
      --accent-dim: rgba(63,70,82,0.09);
      --green: #087a55;
      --green-dim: rgba(8,122,85,0.09);
      --border: rgba(21,23,26,0.1);
      --border-accent: rgba(63,70,82,0.22);
      --border-cyan: rgba(63,70,82,0.2);
      --white: #ffffff;
      --font: "Ethnocentric", "Orbitron", "Eurostile Extended", "Bank Gothic", Arial, sans-serif;
      --ease: 220ms cubic-bezier(.25,.46,.45,.94);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f3f5; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 0%, rgba(63,70,82,0.1), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(148,163,184,0.16), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, #f5f6f8 54%, #ffffff 100%);
    }

    a { color: inherit; text-decoration: none; }

    header, main, footer {
      width: min(900px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 12px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 12px;
      padding: 12px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border-cyan);
      box-shadow: 0 18px 50px rgba(21,23,26,0.1), inset 0 1px 0 rgba(255,255,255,0.88);
      color: var(--ink);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .brand-logo {
      width: 48px;
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(21,23,26,0.16));
    }

    .brand-text {
      background: linear-gradient(135deg, #15171a 24%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border-cyan);
      background: rgba(63,70,82,0.07);
      transition: color var(--ease), border-color var(--ease), background var(--ease), box-shadow var(--ease);
      white-space: nowrap;
    }

    .back-link:hover {
      color: #15171a;
      border-color: rgba(63,70,82,0.46);
      background: rgba(63,70,82,0.12);
      box-shadow: 0 12px 26px rgba(21,23,26,0.12);
    }

    main {
      padding: 60px 0;
      min-height: calc(100vh - 200px);
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.04em;
      margin: 0 0 40px;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(135deg, #15171a 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cart-container {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid var(--border-cyan);
      box-shadow: 0 24px 68px rgba(21,23,26,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .cart-items { padding: 40px; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .cart-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .cart-item-info h4 { margin: 0 0 8px; font-size: 1.1rem; color: var(--ink); }
    .cart-item-info p { margin: 0; color: var(--muted); font-size: 0.88rem; }

    .cart-item-controls { display: flex; align-items: center; gap: 16px; }

    .qty-btn {
      background: var(--surface-3);
      border: 1px solid var(--border);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: border-color var(--ease), color var(--ease);
    }

    .qty-btn:hover { border-color: var(--green); color: var(--green); }

    .qty-display { font-weight: bold; font-size: 1.1rem; min-width: 24px; text-align: center; color: var(--ink); }

    .cart-summary {
      background: var(--surface-2);
      padding: 30px 40px;
      border-top: 1px solid var(--border-cyan);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .summary-text p { margin: 0; color: var(--muted); font-size: 1rem; }
    .summary-text h3 { margin: 4px 0 0; font-size: 1.4rem; color: var(--ink); }

    .checkout-btn {
      padding: 16px 32px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      transition: transform var(--ease), filter var(--ease), box-shadow var(--ease);
      box-shadow: 0 10px 20px rgba(37, 211, 102, 0.25);
    }

    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
      filter: brightness(1.05);
    }

    .empty-cart { text-align: center; padding: 60px 20px; }
    .empty-cart svg { color: var(--muted); margin-bottom: 20px; opacity: 0.5; }
    .empty-cart p { color: var(--muted); font-size: 1rem; margin-bottom: 30px; }

    .return-btn {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent), #252a31);
      color: white;
      border-radius: 10px;
      font-weight: bold;
      display: inline-block;
      transition: transform var(--ease), filter var(--ease), box-shadow var(--ease);
      box-shadow: 0 14px 30px rgba(21,23,26,0.18);
    }

    .return-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(21,23,26,0.24);
    }

    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.88rem;
      border-top: 1px solid var(--border-cyan);
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .header-nav-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #4a525c;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color var(--ease), background var(--ease), transform var(--ease);
    }

    .header-nav-link:hover {
      color: #15171a;
      background: rgba(63,70,82,0.08);
      transform: translateY(-1px);
    }

    @media (max-width: 600px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        border-radius: 22px;
      }

      .header-nav {
        justify-content: flex-start;
      }

      .header-nav-link,
      .back-link {
        min-height: 34px;
        padding: 7px 10px;
        font-size: 0.68rem;
      }

      main {
        padding: 42px 0;
      }

      .cart-items {
        padding: 24px;
      }

      .cart-item { flex-direction: column; align-items: flex-start; gap: 16px; }
      .cart-summary { flex-direction: column; align-items: stretch; gap: 24px; text-align: center; padding: 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">
      <img class="brand-logo" src="../photos/Solutions/solutions_logo_transparent.webp" alt="Clickline Solutions" width="48" height="36" decoding="async"/>
      <span class="brand-text">Clickline Solutions</span>
    </a>
    <nav class="header-nav" aria-label="Navegación de cesta">
      <a class="header-nav-link" href="index.html#runfoodapp">RunFoodApp</a>
      <a class="header-nav-link" href="index.html#productos">Productos</a>
      <a class="header-nav-link" href="index.html#contacto">Contacto</a>
      <a class="back-link" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Catálogo
      </a>
    </nav>
  </header>

  <main>
    <h1>Tu cesta de compra</h1>
    <div class="cart-container" id="cart-container">
      <!-- Injected via JS -->
    </div>
  </main>

  <footer>© 2026 Clickline Solutions. Todos los derechos reservados.</footer>

  <script>
    const cartContainer = document.getElementById('cart-container');
    
    function loadCart() {
      try {
        const storedCart = JSON.parse(localStorage.getItem('clickline_cart') || '{}');
        return storedCart && typeof storedCart === 'object' && !Array.isArray(storedCart)
          ? storedCart
          : {};
      } catch (error) {
        localStorage.removeItem('clickline_cart');
        return {};
      }
    }

    function saveCart(cart) {
      localStorage.setItem('clickline_cart', JSON.stringify(cart));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function updateQuantity(item, delta) {
      const cart = loadCart();
      if (!cart[item]) return;
      
      cart[item] = Number(cart[item] || 0) + delta;
      if (cart[item] <= 0) {
        delete cart[item];
      }
      
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = loadCart();
      const items = Object.entries(cart);
      const totalItems = items.reduce((sum, [_, qty]) => sum + Number(qty || 0), 0);

      if (items.length === 0) {
        cartContainer.innerHTML = `
          <div class="empty-cart">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <p>Tu cesta está vacía. Descubre nuestros productos tecnológicos.</p>
            <a href="index.html" class="return-btn">Ir al catálogo</a>
          </div>
        `;
        return;
      }

      let itemsHtml = '<div class="cart-items">';
      items.forEach(([item, qty]) => {
        const safeItem = escapeHtml(item);
        itemsHtml += `
          <div class="cart-item">
            <div class="cart-item-info">
              <h4>${safeItem}</h4>
              <p>Unidad</p>
            </div>
            <div class="cart-item-controls">
              <button class="qty-btn" type="button" data-cart-item="${safeItem}" data-cart-delta="-1" aria-label="Quitar una unidad de ${safeItem}">-</button>
              <span class="qty-display">${Number(qty || 0)}</span>
              <button class="qty-btn" type="button" data-cart-item="${safeItem}" data-cart-delta="1" aria-label="Añadir una unidad de ${safeItem}">+</button>
            </div>
          </div>
        `;
      });
      itemsHtml += '</div>';

      const summaryHtml = `
        <div class="cart-summary">
          <div class="summary-text">
            <p>Total de artículos</p>
            <h3>${totalItems} productos</h3>
          </div>
          <button class="checkout-btn" type="button" id="checkout-btn">
            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 32 32" fill="currentColor">
              <path d="M16.02 3.2A12.76 12.76 0 0 0 5.14 22.6L3.6 28.8l6.34-1.48A12.78 12.78 0 1 0 16.02 3.2Zm0 22.88c-2.08 0-4.02-.62-5.64-1.68l-.4-.26-3.76.88.9-3.64-.28-.42a10.02 10.02 0 1 1 9.18 5.12Zm5.5-7.48c-.3-.16-1.8-.9-2.08-1-.28-.1-.48-.16-.68.16-.2.3-.78 1-.96 1.2-.18.2-.36.22-.66.08-.3-.16-1.28-.48-2.44-1.52-.9-.8-1.52-1.8-1.7-2.1-.18-.3-.02-.48.14-.62.14-.14.3-.36.46-.54.16-.18.2-.3.3-.5.1-.2.06-.38-.02-.54-.08-.16-.68-1.64-.94-2.24-.24-.58-.5-.5-.68-.5h-.58c-.2 0-.52.08-.8.38-.28.3-1.04 1.02-1.04 2.48s1.06 2.88 1.2 3.08c.16.2 2.1 3.2 5.08 4.48.7.3 1.26.48 1.7.62.72.22 1.36.2 1.88.12.58-.08 1.8-.74 2.06-1.44.26-.72.26-1.32.18-1.44-.08-.14-.28-.22-.58-.38Z"></path>
            </svg>
            Comprar por WhatsApp
          </button>
        </div>
      `;

      cartContainer.innerHTML = itemsHtml + summaryHtml;
    }

    function checkout() {
      const cart = loadCart();
      const items = Object.entries(cart);
      
      if (items.length === 0) return;
      
      let message = "Hola, me gustaría comprar los siguientes productos de Clickline Solutions:\n\n";
      items.forEach(([item, qty]) => {
        message += `- ${qty}x ${item}\n`;
      });
      
      const whatsappUrl = `https://wa.me/593984454938?text=${encodeURIComponent(message)}`;
      window.open(whatsappUrl, '_blank');
    }

    // Initialize
    renderCart();

    cartContainer.addEventListener('click', (event) => {
      const quantityButton = event.target.closest('[data-cart-item]');
      if (quantityButton) {
        updateQuantity(quantityButton.dataset.cartItem, Number(quantityButton.dataset.cartDelta));
        return;
      }

      if (event.target.closest('#checkout-btn')) {
        checkout();
      }
    });
  </script>
</body>
</html>
