<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cesta de Compras | Clickline Solutions</title>
  <meta name="theme-color" content="#050505"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #ed1018;
      --red-dark: #c00d14;
      --soft: #f8f9fa;
      --ink: #111111;
      --white: #ffffff;
      --muted: #6c757d;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      font-family: "Plus Jakarta Sans", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--white) 0%, var(--soft) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header, main, footer {
      width: min(900px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-logo {
      width: 60px;
      height: 45px;
      object-fit: contain;
    }

    .back-link {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .back-link:hover {
      color: var(--ink);
    }

    main {
      padding: 60px 0;
      min-height: calc(100vh - 200px);
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
      margin: 0 0 40px;
      text-align: center;
    }

    .cart-container {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid rgba(237, 16, 24, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .cart-items {
      padding: 40px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    
    .cart-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .cart-item-info h4 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .cart-item-info p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .qty-btn {
      background: var(--soft);
      border: 1px solid rgba(0,0,0,0.1);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .qty-btn:hover {
      background: #e9ecef;
    }

    .qty-display {
      font-weight: bold;
      font-size: 1.1rem;
      min-width: 24px;
      text-align: center;
    }

    .cart-summary {
      background: var(--soft);
      padding: 30px 40px;
      border-top: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .summary-text p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }
    
    .summary-text h3 {
      margin: 4px 0 0;
      font-size: 1.4rem;
    }

    .checkout-btn {
      padding: 16px 32px;
      background: #25D366; /* WhatsApp Green */
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
    }

    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
      filter: brightness(1.05);
    }

    .empty-cart {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-cart svg {
      color: var(--muted);
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-cart p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    
    .return-btn {
      padding: 14px 28px;
      background: var(--red);
      color: white;
      border-radius: 10px;
      font-weight: bold;
      display: inline-block;
      transition: all 0.2s;
    }
    
    .return-btn:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    @media (max-width: 600px) {
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .cart-summary {
        flex-direction: column;
        align-items: stretch;
        gap: 24px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">
      <img class="brand-logo" src="../photos/Solutions/solutions_logo_transparent.png" alt="Clickline Solutions"/>
      <span>Clickline Solutions</span>
    </a>
    <a class="back-link" href="index.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver al catálogo
    </a>
  </header>

  <main>
    <h1>Tu cesta de compra</h1>
    <div class="cart-container" id="cart-container">
      <!-- Injected via JS -->
    </div>
  </main>

  <footer>© 2026 Clickline Solutions. Todos los derechos reservados.</footer>

  <script>
    const cartContainer = document.getElementById('cart-container');
    
    function loadCart() {
      return JSON.parse(localStorage.getItem('clickline_cart')) || {};
    }

    function saveCart(cart) {
      localStorage.setItem('clickline_cart', JSON.stringify(cart));
    }

    function updateQuantity(item, delta) {
      const cart = loadCart();
      if (!cart[item]) return;
      
      cart[item] += delta;
      if (cart[item] <= 0) {
        delete cart[item];
      }
      
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = loadCart();
      const items = Object.entries(cart);
      const totalItems = items.reduce((sum, [_, qty]) => sum + qty, 0);

      if (items.length === 0) {
        cartContainer.innerHTML = `
          <div class="empty-cart">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <p>Tu cesta está vacía. Descubre nuestros productos tecnológicos.</p>
            <a href="index.html" class="return-btn">Ir al catálogo</a>
          </div>
        `;
        return;
      }

      let itemsHtml = '<div class="cart-items">';
      items.forEach(([item, qty]) => {
        itemsHtml += `
          <div class="cart-item">
            <div class="cart-item-info">
              <h4>${item}</h4>
              <p>Unidad</p>
            </div>
            <div class="cart-item-controls">
              <button class="qty-btn" onclick="updateQuantity('${item}', -1)">-</button>
              <span class="qty-display">${qty}</span>
              <button class="qty-btn" onclick="updateQuantity('${item}', 1)">+</button>
            </div>
          </div>
        `;
      });
      itemsHtml += '</div>';

      const summaryHtml = `
        <div class="cart-summary">
          <div class="summary-text">
            <p>Total de artículos</p>
            <h3>${totalItems} productos</h3>
          </div>
          <button class="checkout-btn" onclick="checkout()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
            Comprar por WhatsApp
          </button>
        </div>
      `;

      cartContainer.innerHTML = itemsHtml + summaryHtml;
    }

    function checkout() {
      const cart = loadCart();
      const items = Object.entries(cart);
      
      if (items.length === 0) return;
      
      let message = "Hola, me gustaría comprar los siguientes productos de Clickline Solutions:\n\n";
      items.forEach(([item, qty]) => {
        message += `- ${qty}x ${item}\n`;
      });
      
      const whatsappUrl = `https://wa.me/593984454938?text=${encodeURIComponent(message)}`;
      window.open(whatsappUrl, '_blank');
    }

    // Initialize
    renderCart();
  </script>
</body>
</html>
